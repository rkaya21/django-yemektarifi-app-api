---
name: Checks

on: [push]

jobs:
  test-lint:
    name: Test and Lint
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: dev-secret-key

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: docker compose run --rm app sh -c "python manage.py wait_for_db && COVERAGE_FILE=/tmp/.coverage coverage run manage.py test && COVERAGE_FILE=/tmp/.coverage coverage report"

      - name: Lint
        run: docker compose run --rm app sh -c "flake8"
