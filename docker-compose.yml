services:
  app:
    build:
      context: .
      args:
        - DEV=true
    ports:
      - "8001:8000"
    volumes:
      - ./app:/app
      - dev-media-data:/app/media
    command: >
      sh -c "cd /app &&
             python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-app.settings}
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-recdb}
      - DB_USER=${DB_USER:-recuser}
      - DB_PASS=${DB_PASS:-recpass}
    depends_on:
      - db

  db:
    image: postgres:13-alpine
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-recdb}
      - POSTGRES_USER=${DB_USER:-recuser}
      - POSTGRES_PASSWORD=${DB_PASS:-recpass}


volumes:
  dev-db-data:
  dev-media-data:
